name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch: # allow manual "Run workflow" from the Actions tab

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest # trusted publishing requires npm >= 11.5.1
      - run: npm ci
      - run: npm run build
      - run: npm publish --provenance --access public
